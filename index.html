<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guinness Price Map Israel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">
</head><body>
<div id="map"></div>
<div id="header"><img src="guinness-logo.png" alt="Guinness"></div>
<input id="search" placeholder="Search a pub...">
<button id="toggle">🏆</button>
<div id="leaderboard" class="panel"><h3>Top 5 Cheapest</h3><div id="top5"></div></div>
<div id="stats" class="panel"><h3>Statistics</h3><div id="statistics"></div></div>
<div id="legend" class="panel">🟢 Under ₪30<br>🟠 ₪30–37<br>🔴 ₪38+</div>
<button id="addBtn">➕ Add a Guinness price</button>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>
</body></html>
