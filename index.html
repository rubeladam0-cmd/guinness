<!DOCTYPE html>
<html>
<head>
<title>Guinness Price Map Israel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body,#map{
    height:100%;
    margin:0;
}

.price-marker{
    display:flex;
    align-items:center;
    justify-content:center;
    width:42px;
    height:42px;
    border-radius:50%;
    color:white;
    font-weight:bold;
    border:3px solid white;
    box-shadow:0 2px 6px #555;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([32.08,34.78],10);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 attribution:'© OpenStreetMap'
}
).addTo(map);



fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vR_xfrEwxZmID0a87zlVBAxKp-C1x8mF2D7wTCjcQ1l-4jDM9UOZfkBZnKSgYevcoDAe1JcMdWFqGUD/pub?output=csv")

.then(r=>r.text())

.then(csv=>{


let lines = csv.split("\n");

console.log(lines);


for(let i=1;i<lines.length;i++){


let row = lines[i];

let data = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);


if(!data) continue;


let name=data[0];
let price=data[1];
let website=data[2];
let notes=data[3];
let lat=parseFloat(data[4]);
let lng=parseFloat(data[5]);


if(isNaN(lat)||isNaN(lng)) continue;



let color="#f39c12";

if(price<=29) color="#27ae60";
if(price>=38) color="#e74c3c";



let marker=L.marker([lat,lng],{

icon:L.divIcon({

className:"",
html:
`
<div class="price-marker" style="background:${color}">
₪${price}
</div>
`,
iconSize:[42,42]

})

}).addTo(map);



marker.bindPopup(`
<h3>${name}</h3>
<b>Guinness:</b> ₪${price}<br><br>

${website ? `<a href="${website}" target="_blank">Website</a><br><br>`:""}

${notes ? notes:""}

`);

}


});

</script>

</body>
</html>
