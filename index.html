<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guinness Price Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100vh;
}

.price-label{
    background:#111;
    color:white;
    border-radius:6px;
    padding:3px 6px;
    font-weight:bold;
    font-size:14px;
    border:2px solid white;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([31.7683,35.2137],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);

var places = [
    {
        name:"Example Pub",
        price:"₪34",
        lat:32.0853,
        lng:34.7818
    }
];

places.forEach(function(place){

    L.marker([place.lat,place.lng]).addTo(map)
    .bindPopup("<b>"+place.name+"</b><br>"+place.price);

    L.marker([place.lat,place.lng],{
        icon:L.divIcon({
            className:"",
            html:'<div class="price-label">'+place.price+'</div>',
            iconSize:[40,20]
        })
    }).addTo(map);

});

</script>

</body>
</html>
