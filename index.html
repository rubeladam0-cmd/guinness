<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guinness Price Map Israel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

html, body {
    margin:0;
    height:100%;
}

#map {
    width:100%;
    height:100vh;
}

.price-marker {
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
    font-size:14px;
    width:42px;
    height:42px;
    border-radius:50%;
    border:3px solid white;
    box-shadow:0 2px 6px rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([32.08,34.78],10);


L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
}).addTo(map);



fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vR_xfrEwxZmID0a87zlVBAxKp-C1x8mF2D7wTCjcQ1l-4jDM9UOZfkBZnKSgYevcoDAe1JcMdWFqGUD/pub?output=csv")

.then(response => response.text())

.then(csv => {


let rows = csv.split("\n");


rows.slice(1).forEach(row => {


    let columns = row.split(",");


    let name = columns[0];
    let price = columns[1];
    let website = columns[2];
    let notes = columns[3];

    let lat = parseFloat(columns[4]);
    let lng = parseFloat(columns[5]);


    if(!lat || !lng) return;



    let color = "#f39c12";


    if(Number(price) <= 29){
        color="#27ae60";
    }

    if(Number(price) >= 38){
        color="#e74c3c";
    }



    let icon = L.divIcon({

        className:"",

        html:
        `
        <div class="price-marker" style="background:${color}">
            ₪${price}
        </div>
        `,

        iconSize:[42,42],

        iconAnchor:[21,21]

    });



    let marker = L.marker([lat,lng],{
        icon:icon
    }).addTo(map);



    marker.bindPopup(

    `
    <div style="min-width:200px">

    <h3>${name}</h3>

    <b>Guinness price:</b> ₪${price}

    <br><br>


    ${
    website 
    ?
    `<a href="${website}" target="_blank">
    🌐 Visit website
    </a>`
    :
    ""
    }


    <br><br>


    ${
    notes
    ?
    `<b>Notes:</b><br>${notes}`
    :
    ""
    }


    </div>

    `

    );


});


});


</script>


</body>
</html>
